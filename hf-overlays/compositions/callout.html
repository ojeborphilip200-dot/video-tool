<div id="root" data-composition-id="callout"
     data-start="0" data-width="1280" data-height="720" data-fps="25">

  <div id="pill" class="clip" data-start="0" data-duration="6" data-track-index="0"
       style="position: absolute; top: 16%; left: 50%; transform: translate(-50%, 0);
              border-radius: 999px; padding: 14px 34px; opacity: 0;">
    <span id="txt" style="font-weight: 700; font-size: 44px; letter-spacing: 3px; white-space: nowrap;"></span>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script>
    const THEMES = {
      standard:   { font: "Arial, sans-serif",             bg: "#ffffff", border: "#ffffff", color: "#000000" },
      crime:      { font: "'Arial Narrow', Arial",          bg: "#101010", border: "#e83c3c", color: "#e83c3c" },
      history:    { font: "Georgia, serif",                 bg: "#e8dfc8", border: "#c9bfa5", color: "#3c2d1e" },
      modern:     { font: "'Helvetica Neue', Arial",        bg: "#4f7cff", border: "#4f7cff", color: "#ffffff" },
      minimalist: { font: "'Helvetica Neue', Arial",        bg: "transparent", border: "rgba(255,255,255,0.8)", color: "#ffffff" },
    };

    const v = Object.assign(
      { text: "1969", theme: "standard", dur: 4 },
      (window.__hyperframes && window.__hyperframes.getVariables && window.__hyperframes.getVariables()) || {}
    );
    const th = THEMES[v.theme] || THEMES.standard;
    const pill = document.getElementById("pill");
    const txt = document.getElementById("txt");
    txt.textContent = String(v.text).toUpperCase();
    txt.style.fontFamily = th.font;
    txt.style.color = th.color;
    pill.style.background = th.bg;
    pill.style.border = "2px solid " + th.border;

    const dur = Math.min(Math.max(Number(v.dur) || 4, 1.2), 5.5);
    const tl = gsap.timeline({ paused: true });
    tl.to("#pill", { opacity: 1, duration: 0.01 }, 0)
      .from("#pill", { scale: 1.5, duration: 0.35, ease: "power3.out" }, 0)
      .from("#txt", { y: 22, opacity: 0, letterSpacing: "12px", duration: 0.45, ease: "back.out(1.8)" }, 0.12)
      .to("#pill", { opacity: 0, y: -14, duration: 0.35, ease: "power2.in" }, dur - 0.35);
    window.__timelines = window.__timelines || {};
    window.__timelines["callout"] = tl;
  </script>
</div>
